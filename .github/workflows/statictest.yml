name: go vet test

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  statictest:
    runs-on: ubuntu-latest
    container: golang:1.24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: User - Verify dependencies
        run:  |
          go mod verify

      - name: User - Run go vet
        run:  |
          go vet ./...

      - name: Run statictest
        run: |
          go vet -vettool=$(which statictest) ./...
