services:
  db:
    image: postgres:16.3
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U keeper' ]
      interval: 10s
      start_period: 40s
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keeper}
      POSTGRES_USER: ${POSTGRES_USER:-keeper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keeper}
      PGTZ: ${TIME_ZONE:-Europe/Moscow}
    volumes:
      - db:/var/lib/postgresql/data:rw
    ports:
      - '5432:5432'

volumes:
  db: { }